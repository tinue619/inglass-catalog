<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marmarill Decor — Каталог 2024</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #c9a96e;
    --text: #e8e8e8;
    --text-muted: #888;
    --thumb-size: 72px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── HEADER ─────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 12px;
  }

  .logo {
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
  }

  .page-counter {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn-icon {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }

  .btn-icon:hover, .btn-icon.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(201,169,110,.08);
  }

  /* ── VIEWER ─────────────────────────────── */
  .viewer-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .viewer {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    transition: opacity .25s ease;
    opacity: 1;
  }

  .page-img.loading { opacity: 0; }

  /* arrows */
  .arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    background: rgba(0,0,0,.55);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    z-index: 10;
    backdrop-filter: blur(4px);
  }

  .arrow:hover { background: rgba(201,169,110,.25); border-color: var(--accent); color: var(--accent); }
  .arrow.prev { left: 12px; }
  .arrow.next { right: 12px; }
  .arrow:disabled { opacity: .25; pointer-events: none; }

  /* ── THUMBNAILS ──────────────────────────── */
  .thumbs-bar {
    height: calc(var(--thumb-size) + 20px);
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
    overflow-y: hidden;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 8px;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .thumbs-bar::-webkit-scrollbar { height: 4px; }
  .thumbs-bar::-webkit-scrollbar-track { background: transparent; }
  .thumbs-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .thumb {
    flex-shrink: 0;
    width: var(--thumb-size);
    height: var(--thumb-size);
    border-radius: 5px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .15s, transform .15s;
    position: relative;
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumb .thumb-num {
    position: absolute;
    bottom: 2px;
    right: 4px;
    font-size: 9px;
    color: rgba(255,255,255,.6);
    background: rgba(0,0,0,.4);
    padding: 1px 3px;
    border-radius: 3px;
  }

  .thumb:hover { transform: scale(1.05); border-color: rgba(201,169,110,.5); }
  .thumb.active { border-color: var(--accent); }

  /* ── FULLSCREEN OVERLAY ──────────────────── */
  .fs-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .fs-overlay.open { display: flex; }

  .fs-overlay img {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
  }

  .fs-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    background: rgba(255,255,255,.1);
    border: none;
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── MOBILE ──────────────────────────────── */
  @media (max-width: 600px) {
    :root { --thumb-size: 56px; }
    header { padding: 0 12px; }
    .logo { font-size: 12px; letter-spacing: 3px; }
    .arrow { width: 36px; height: 36px; }
    .arrow.prev { left: 6px; }
    .arrow.next { right: 6px; }
  }

  /* ── PROGRESS BAR ────────────────────────── */
  .progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    transition: width .3s ease;
    z-index: 5;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Marmarill</div>
  <div class="page-counter" id="counter">1 / 21</div>
  <div class="header-actions">
    <button class="btn-icon" id="btnFullscreen" title="Полный экран">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
    <button class="btn-icon" id="btnZoom" title="Открыть на весь экран">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
      </svg>
    </button>
  </div>
</header>

<div class="viewer-wrap">
  <div class="viewer">
    <div class="progress" id="progress"></div>
    <button class="arrow prev" id="btnPrev">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <img class="page-img" id="mainImg" src="pages/page_01.jpg" alt="Страница 1">
    <button class="arrow next" id="btnNext">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>
</div>

<div class="thumbs-bar" id="thumbsBar"></div>

<!-- Fullscreen overlay -->
<div class="fs-overlay" id="fsOverlay">
  <img id="fsImg" src="" alt="">
  <button class="fs-close" id="fsClose">×</button>
</div>

<script>
const TOTAL = 21;
let current = 1;
let startX = 0;

const mainImg = document.getElementById('mainImg');
const counter = document.getElementById('counter');
const progress = document.getElementById('progress');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const thumbsBar = document.getElementById('thumbsBar');
const fsOverlay = document.getElementById('fsOverlay');
const fsImg = document.getElementById('fsImg');

function imgSrc(n) {
  return `pages/page_${String(n).padStart(2,'0')}.jpg`;
}

// Build thumbnails
for (let i = 1; i <= TOTAL; i++) {
  const div = document.createElement('div');
  div.className = 'thumb' + (i === 1 ? ' active' : '');
  div.dataset.page = i;
  div.innerHTML = `<img src="${imgSrc(i)}" loading="lazy" alt=""><span class="thumb-num">${i}</span>`;
  div.addEventListener('click', () => goTo(i));
  thumbsBar.appendChild(div);
}

function goTo(n) {
  if (n < 1 || n > TOTAL) return;
  current = n;

  mainImg.classList.add('loading');
  const tmp = new Image();
  tmp.onload = () => {
    mainImg.src = tmp.src;
    mainImg.classList.remove('loading');
  };
  tmp.src = imgSrc(n);

  counter.textContent = `${n} / ${TOTAL}`;
  progress.style.width = `${(n / TOTAL) * 100}%`;

  btnPrev.disabled = n === 1;
  btnNext.disabled = n === TOTAL;

  // Sync thumbnails
  document.querySelectorAll('.thumb').forEach(t => {
    t.classList.toggle('active', +t.dataset.page === n);
  });

  // Scroll active thumb into view
  const activeThumb = thumbsBar.querySelector('.thumb.active');
  if (activeThumb) {
    activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  // Preload neighbors
  [n-1, n+1].forEach(p => { if (p >= 1 && p <= TOTAL) new Image().src = imgSrc(p); });
}

btnPrev.addEventListener('click', () => goTo(current - 1));
btnNext.addEventListener('click', () => goTo(current + 1));

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
  if (e.key === 'Escape') closeFs();
});

// Touch swipe
const viewer = document.querySelector('.viewer-wrap');
viewer.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
viewer.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
}, { passive: true });

// Zoom / fullscreen overlay
document.getElementById('btnZoom').addEventListener('click', () => {
  fsImg.src = imgSrc(current);
  fsOverlay.classList.add('open');
});

function closeFs() { fsOverlay.classList.remove('open'); }
document.getElementById('fsClose').addEventListener('click', closeFs);
fsOverlay.addEventListener('click', e => { if (e.target === fsOverlay) closeFs(); });

// Native fullscreen
document.getElementById('btnFullscreen').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
    document.getElementById('btnFullscreen').classList.add('active');
  } else {
    document.exitFullscreen();
    document.getElementById('btnFullscreen').classList.remove('active');
  }
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.getElementById('btnFullscreen').classList.remove('active');
});

// Init progress
goTo(1);
</script>
</body>
</html>
